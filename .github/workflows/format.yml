name: Format

on:
  push:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      
      - run: bun run lint
      - run : bun run format
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: format'
